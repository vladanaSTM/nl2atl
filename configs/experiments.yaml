experiment:
  name: "nl2atl_300_examples"
  seed: 42
  num_seeds: 3
  # Fixed canonical split, decoupled from the training seed. Defaults to `seed`.
  split_seed: 42

data:
  path: "./data/dataset_gold.json"
  train_size: 0.70
  val_size: 0.10
  test_size: 0.20
  augment_factor: 2
  # Stratify the split on formula structure (single vs multi-reading QSA items).
  stratify: true
  # Stratified cross-validation folds for partition-robustness (0 disables CV).
  cv_folds: 0

training:
  num_epochs: 8
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  bf16: true
  optim: "paged_adamw_8bit"
  lr_scheduler_type: "cosine"
  eval_strategy: "epoch"
  save_strategy: "epoch"
  save_total_limit: 1
  max_grad_norm: 0.3
  gradient_checkpointing: true
  dataloader_num_workers: 2
  dataloader_pin_memory: true
  group_by_length: true
  tf32: true
  packing: false

few_shot:
  # null shows all curated exemplars to every model (the default).
  # Set an integer only to cap the count for an ablation.
  num_examples: null

conditions:
  - name: "baseline_zero_shot"
    finetuned: false
    few_shot: false
  
  - name: "baseline_few_shot"
    finetuned: false
    few_shot: true
  
  - name: "finetuned_zero_shot"
    finetuned: true
    few_shot: false
  
  - name: "finetuned_few_shot"
    finetuned: true
    few_shot: true